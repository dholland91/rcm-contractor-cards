<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM Studios — Contractor Card Register</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-text-primary: #111827;
  --color-text-secondary: #6b7280;
  --color-text-success: #15803d;
  --color-text-warning: #b45309;
  --color-text-danger: #b91c1c;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f3f4f6;
  --color-background-success: #dcfce7;
  --color-background-warning: #fef3c7;
  --color-background-danger: #fee2e2;
  --color-border-primary: #111827;
  --color-border-secondary: #d1d5db;
  --color-border-tertiary: #e5e7eb;
  --color-border-warning: #f59e0b;
  --color-border-success: #22c55e;
  --border-radius-lg: 8px;
  --border-radius-md: 6px;
  --font-mono: 'SF Mono', 'Monaco', ui-monospace, 'Cascadia Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: #f9fafb;
  color: var(--color-text-primary);
  min-height: 100vh;
  font-size: 14px;
}

button {
  font-family: var(--font-sans);
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  padding: 6px 12px;
}
button:hover:not(:disabled) { background: var(--color-background-secondary); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

input, textarea, select {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  padding: 6px 9px;
  background: var(--color-background-primary);
  width: 100%;
}
input:focus, textarea:focus, select:focus { outline: 1.5px solid var(--color-border-primary); }

/* ── Site header ─────────────────────────────────────────────────────────── */
#site-header {
  background: #fff;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 10;
}
#site-header h1 {
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin: 0;
}
#site-header .sub {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--color-text-secondary);
  margin: 0 0 3px;
}
.sync-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #d1d5db;
  flex-shrink: 0;
}
.sync-dot.ok     { background: #22c55e; }
.sync-dot.saving { background: #f59e0b; animation: blink .8s infinite; }
.sync-dot.error  { background: #ef4444; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.sync-label { font-size: 12px; color: var(--color-text-secondary); }

/* ── Token-not-set banner ────────────────────────────────────────────────── */
#token-banner {
  display: none;
  background: var(--color-background-warning);
  border-bottom: 0.5px solid var(--color-border-warning);
  padding: 10px 24px;
  font-size: 12px;
  color: var(--color-text-warning);
  gap: 8px;
  align-items: center;
}
#token-banner.show { display: flex; }
#token-banner strong { font-weight: 600; }

/* ── Main app ────────────────────────────────────────────────────────────── */
#app { padding: 24px; max-width: 960px; margin: 0 auto; }

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 8px 14px 10px;
  font-size: 14px;
  font-weight: 400;
  color: var(--color-text-secondary);
  cursor: pointer;
  border-radius: 0;
  margin-bottom: -0.5px;
}
.tab-btn:hover:not(.active) { background: none; color: var(--color-text-primary); }
.tab-btn.active { color: var(--color-text-primary); font-weight: 500; border-bottom-color: var(--color-text-primary); }

.c-tile {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 14px;
}
.c-tile.sel { border: 1.5px solid var(--color-border-primary); }
.spill {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.fpanel {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 20px;
  margin-top: 16px;
}
.ltable { width: 100%; border-collapse: collapse; font-size: 13px; }
.ltable th {
  text-align: left;
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: .5px solid var(--color-border-tertiary);
  white-space: nowrap;
}
.ltable td { padding: 8px 10px; border-bottom: .5px solid var(--color-border-tertiary); vertical-align: top; }
.fl { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 12px; }
.fl input, .fl textarea, .fl select { width: 100%; box-sizing: border-box; margin-top: 4px; }
#toast {
  display: none;
  padding: 8px 14px;
  border-radius: var(--border-radius-md);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 14px;
  border: 0.5px solid transparent;
}
#toast.show { display: block; }

@media (max-width: 600px) {
  #app { padding: 16px; }
  #site-header { padding: 10px 16px; }
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<div id="site-header">
  <div>
    <p class="sub">RCM Studios</p>
    <h1>Contractor card register</h1>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-label" id="sync-label">Loading…</span>
    <button onclick="doRefresh()" style="font-size:12px;padding:5px 10px;" title="Refresh">
      <i class="ti ti-refresh" style="vertical-align:-2px;font-size:13px;margin-right:3px;"></i>Refresh
    </button>
  </div>
</div>

<!-- ── Token-not-set warning ───────────────────────────────────────────── -->
<div id="token-banner">
  <i class="ti ti-alert-triangle" style="font-size:15px;flex-shrink:0;"></i>
  <span><strong>Read-only mode.</strong> The write token has not been configured — contact the Studios admin to enable issue &amp; return.</span>
</div>

<!-- ── Main app ─────────────────────────────────────────────────────────── -->
<div id="app">
  <div id="toast"></div>

  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
    <div>
      <h2 style="font-size:20px;font-weight:500;color:var(--color-text-primary);margin:0;">Card status</h2>
    </div>
    <div style="display:flex;gap:8px;">
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center;min-width:56px;">
        <p style="font-size:20px;font-weight:500;color:var(--color-text-success);margin:0;" id="cnt-a">—</p>
        <p style="font-size:10px;color:var(--color-text-secondary);margin:0;text-transform:uppercase;letter-spacing:.06em;">Available</p>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center;min-width:56px;">
        <p style="font-size:20px;font-weight:500;color:var(--color-text-warning);margin:0;" id="cnt-i">—</p>
        <p style="font-size:10px;color:var(--color-text-secondary);margin:0;text-transform:uppercase;letter-spacing:.06em;">Issued</p>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center;min-width:56px;">
        <p style="font-size:20px;font-weight:500;color:var(--color-text-danger);margin:0;" id="cnt-o">—</p>
        <p style="font-size:10px;color:var(--color-text-secondary);margin:0;text-transform:uppercase;letter-spacing:.06em;">Overdue</p>
      </div>
    </div>
  </div>

  <div style="border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:20px;display:flex;">
    <button class="tab-btn active" id="tab-cards" onclick="switchTab('cards')">Card status</button>
    <button class="tab-btn" id="tab-log" onclick="switchTab('log')">
      Assignment log <span id="lcnt" style="background:var(--color-background-secondary);color:var(--color-text-secondary);border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px;display:none;"></span>
    </button>
  </div>

  <div id="view-cards">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;" id="cgrid"></div>
    <div id="fpanel" class="fpanel" style="display:none;"></div>
  </div>

  <div id="view-log" style="display:none;">
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button onclick="exportCSV()">
        <i class="ti ti-download" style="font-size:15px;vertical-align:-2px;margin-right:4px;"></i>Export CSV
      </button>
    </div>
    <div style="overflow-x:auto;" id="lwrap"></div>
  </div>
</div>

<script>
// ── CONFIG — Admin: replace the placeholder below with your Fine-grained PAT ──
// Token needs: Contents → Read and write on this repo only.
const WRITE_TOKEN = 'PASTE_TOKEN_HERE';
// ─────────────────────────────────────────────────────────────────────────────

const OWNER = 'dholland91';
const REPO  = 'rcm-contractor-cards';
const FILE  = 'data.json';

const canWrite = WRITE_TOKEN && WRITE_TOKEN !== 'PASTE_TOKEN_HERE';

// ── App state ─────────────────────────────────────────────────────────────
const IDS   = ['01','02','03','04','05','06'];
const STAFF = ['Danny Holland','Julia Tache','Anna Heath','Stephen Harrington','Andy Denyer'];
let cards   = {};
let log     = [];
let sel     = null;
let selAct  = null;
let fileSha = null;

// ── GitHub API helpers ────────────────────────────────────────────────────
function readHeaders() {
  // Reads are unauthenticated on a public repo
  return { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
}
function writeHeaders() {
  return { ...readHeaders(), 'Authorization': `Bearer ${WRITE_TOKEN}`, 'Content-Type': 'application/json' };
}

async function loadFromGitHub() {
  setSyncState('saving', 'Loading…');
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, { headers: readHeaders() });
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    const json = await res.json();
    fileSha = json.sha;
    const data = JSON.parse(atob(json.content.replace(/\n/g, '')));
    cards = data.cards || {};
    log   = data.log   || [];
    IDS.forEach(id => { if (!cards[id]) cards[id] = { status: 'available', assignment: null }; });
    setSyncState('ok', 'Up to date · ' + fmtHHMM(new Date()));
    return true;
  } catch (e) {
    setSyncState('error', 'Load failed');
    console.error(e);
    return false;
  }
}

async function save() {
  if (!canWrite) { showToast('Write token not configured — contact admin.', 'warn'); return; }
  setSyncState('saving', 'Saving…');
  if (!fileSha) await loadFromGitHub();
  try {
    const payload = { cards, log };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: writeHeaders(),
      body: JSON.stringify({ message: `Card update ${new Date().toISOString()}`, content: encoded, sha: fileSha }),
    });
    if (res.status === 409) {
      showToast('Another update just happened — reloading…', 'warn');
      await loadFromGitHub();
      return;
    }
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    const json = await res.json();
    fileSha = json.content.sha;
    setSyncState('ok', 'Saved · ' + fmtHHMM(new Date()));
  } catch (e) {
    setSyncState('error', 'Save failed — please try again');
    showToast('Save failed — please try again.', 'warn');
    console.error(e);
  }
}

// ── Sync indicator ────────────────────────────────────────────────────────
function setSyncState(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + (state === 'ok' ? 'ok' : state === 'saving' ? 'saving' : 'error');
  document.getElementById('sync-label').textContent = label;
}

async function doRefresh() {
  const ok = await loadFromGitHub();
  if (ok) { renderCards(); updCounts(); renderLog(); }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmt(v, wt) {
  if (!v) return '—';
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
    const [y,m,d] = v.split('-');
    return parseInt(d)+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+y;
  }
  const dt = new Date(v); if (isNaN(dt)) return v;
  const s = dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  return wt ? s+', '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : s;
}
function fmtHHMM(d) { return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function isOD(c) {
  if (c.status !== 'issued' || !c.assignment?.expectedReturn) return false;
  return c.assignment.expectedReturn < new Date().toISOString().split('T')[0];
}

// ── Counts ────────────────────────────────────────────────────────────────
function updCounts() {
  document.getElementById('cnt-a').textContent = IDS.filter(id => cards[id]?.status === 'available').length;
  document.getElementById('cnt-i').textContent = IDS.filter(id => cards[id]?.status === 'issued').length;
  document.getElementById('cnt-o').textContent = IDS.filter(id => isOD(cards[id]||{})).length;
  const lc = document.getElementById('lcnt');
  if (log.length > 0) { lc.style.display = ''; lc.textContent = log.length; } else lc.style.display = 'none';
}

// ── Render cards ──────────────────────────────────────────────────────────
function renderCards() {
  document.getElementById('cgrid').innerHTML = IDS.map(id => {
    const c  = cards[id] || { status:'available', assignment:null };
    const od = isOD(c);
    const sc = c.status==='available' ? 'var(--color-text-success)' : od ? 'var(--color-text-danger)' : 'var(--color-text-warning)';
    const sb = c.status==='available' ? 'var(--color-background-success)' : od ? 'var(--color-background-danger)' : 'var(--color-background-warning)';
    const sl = c.status==='available' ? 'Available' : od ? 'Overdue' : 'Issued';

    let body = '';
    if (c.status === 'issued' && c.assignment) {
      const a = c.assignment;
      body = `<p style="font-size:12px;color:var(--color-text-secondary);margin:8px 0 2px;">Contractor</p>
        <p style="font-size:13px;font-weight:500;margin:0 0 2px;color:var(--color-text-primary);">${esc(a.name)}</p>
        ${a.company ? `<p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 4px;">${esc(a.company)}</p>` : ''}
        <p style="font-size:12px;color:${od?'var(--color-text-danger)':'var(--color-text-secondary)'};margin:0;">Return: ${fmt(a.expectedReturn)||'not set'}</p>`;
    } else {
      body = `<p style="font-size:12px;color:var(--color-text-secondary);margin:8px 0 0;">No active assignment</p>`;
    }

    // Issue/return button — disabled if write token not configured
    const btnLabel = c.status==='available' ? 'Issue card' : 'Return card';
    const btn = canWrite
      ? `<button style="margin-top:10px;width:100%;font-size:12px;" onclick="selCard('${id}')">${btnLabel}</button>`
      : `<button style="margin-top:10px;width:100%;font-size:12px;" disabled title="Write token not configured">${btnLabel}</button>`;

    return `<div class="c-tile${sel===id?' sel':''}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
        <i class="ti ti-credit-card" style="font-size:16px;color:${sc};"></i>
        <span style="font-family:var(--font-mono);font-size:14px;font-weight:500;">Card ${id}</span>
      </div>
      <span class="spill" style="background:${sb};color:${sc};">${sl}</span>
      ${body}
      <div style="margin-top:10px;">${btn}</div>
    </div>`;
  }).join('');
}

// ── Select card / forms ───────────────────────────────────────────────────
function selCard(id) {
  if (!canWrite) return;
  if (sel === id) { sel = null; selAct = null; document.getElementById('fpanel').style.display = 'none'; }
  else { sel = id; selAct = cards[id]?.status === 'available' ? 'issue' : 'return'; showForm(); }
  renderCards();
}

function showForm() {
  const p = document.getElementById('fpanel'); p.style.display = 'block';
  const today = new Date().toISOString().split('T')[0];
  const sOpts = STAFF.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');

  if (selAct === 'issue') {
    p.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h3 style="font-size:16px;font-weight:500;margin:0;">Issue card ${sel}</h3>
        <button onclick="closePanel()" style="font-size:13px;color:var(--color-text-secondary);">Cancel</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <label class="fl">Contractor name *<input id="fn" type="text" placeholder="Full name" /></label>
        <label class="fl">Company / organisation<input id="fco" type="text" placeholder="e.g. Team Audio" /></label>
        <label class="fl">Contact phone<input id="fph" type="tel" placeholder="Mobile" /></label>
        <label class="fl">Expected return<input id="fret" type="date" min="${today}" /></label>
      </div>
      <label class="fl">Issued by *<input id="fby" type="text" list="stfl" placeholder="Staff member" /><datalist id="stfl">${sOpts}</datalist></label>
      <label class="fl">Notes<textarea id="fnt" placeholder="Access required, work area, job ref…" style="height:52px;resize:vertical;"></textarea></label>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button onclick="closePanel()">Cancel</button>
        <button id="issue-btn" onclick="doIssue()" style="font-weight:500;">Issue card ${sel}</button>
      </div>`;
  } else {
    const a = cards[sel]?.assignment || {};
    p.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h3 style="font-size:16px;font-weight:500;margin:0;">Return card ${sel}</h3>
        <button onclick="closePanel()" style="font-size:13px;color:var(--color-text-secondary);">Cancel</button>
      </div>
      <div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
        <div><span style="color:var(--color-text-secondary);">Issued to</span><br><span style="font-weight:500;">${esc(a.name)}</span></div>
        <div><span style="color:var(--color-text-secondary);">Company</span><br><span>${esc(a.company||'—')}</span></div>
        <div><span style="color:var(--color-text-secondary);">Issued at</span><br><span>${fmt(a.issuedAt,true)}</span></div>
        <div><span style="color:var(--color-text-secondary);">Issued by</span><br><span>${esc(a.issuedBy)}</span></div>
      </div>
      <label class="fl">Return notes (optional)<textarea id="frn" placeholder="Any comments on the return…" style="height:52px;resize:vertical;"></textarea></label>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button onclick="closePanel()">Cancel</button>
        <button id="return-btn" onclick="doReturn()" style="font-weight:500;">Confirm return</button>
      </div>`;
  }
}

function closePanel() { sel = null; selAct = null; document.getElementById('fpanel').style.display='none'; renderCards(); }

// ── Actions ───────────────────────────────────────────────────────────────
async function doIssue() {
  const name = (document.getElementById('fn').value||'').trim();
  const by   = (document.getElementById('fby').value||'').trim();
  if (!name||!by) { showToast('Please enter contractor name and issuing staff member.','warn'); return; }
  const btn = document.getElementById('issue-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const now = new Date().toISOString(); const lid = sel+'-'+Date.now();
  const asgn = {
    logId:lid, name,
    company:(document.getElementById('fco').value||'').trim(),
    phone:(document.getElementById('fph').value||'').trim(),
    expectedReturn:document.getElementById('fret').value||'',
    issuedBy:by, notes:(document.getElementById('fnt').value||'').trim(), issuedAt:now
  };
  cards[sel] = { status:'issued', assignment:asgn };
  log.unshift({ ...asgn, cardId:sel, returnedAt:null, returnNotes:null });
  await save();
  closePanel(); renderCards(); updCounts();
  showToast('Card '+sel+' issued to '+name);
}

async function doReturn() {
  const cid = sel; const a = cards[cid]?.assignment;
  const btn = document.getElementById('return-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const now = new Date().toISOString();
  const rn  = (document.getElementById('frn')?.value||'').trim();
  cards[cid] = { status:'available', assignment:null };
  log = log.map(e => e.logId===a.logId ? {...e, returnedAt:now, returnNotes:rn} : e);
  await save();
  closePanel(); renderCards(); updCounts();
  showToast('Card '+cid+' marked as returned');
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(v) {
  document.getElementById('view-cards').style.display = v==='cards' ? '' : 'none';
  document.getElementById('view-log').style.display   = v==='log'   ? '' : 'none';
  document.getElementById('tab-cards').classList.toggle('active', v==='cards');
  document.getElementById('tab-log').classList.toggle('active',   v==='log');
  if (v==='log') renderLog();
}

// ── Log ───────────────────────────────────────────────────────────────────
function renderLog() {
  const w = document.getElementById('lwrap');
  if (!log.length) { w.innerHTML=`<p style="color:var(--color-text-secondary);font-size:14px;text-align:center;padding:40px 0;">No assignments recorded yet.</p>`; return; }
  const rows = log.map(e => `<tr>
    <td style="font-family:var(--font-mono);font-weight:500;">${esc(e.cardId)}</td>
    <td>${esc(e.name)}</td>
    <td>${esc(e.company||'—')}</td>
    <td style="white-space:nowrap;">${fmt(e.issuedAt,true)}</td>
    <td>${fmt(e.expectedReturn)}</td>
    <td>${esc(e.issuedBy)}</td>
    <td style="white-space:nowrap;">${e.returnedAt ? fmt(e.returnedAt,true) : '<span style="color:var(--color-text-warning);">Outstanding</span>'}</td>
  </tr>`).join('');
  w.innerHTML = `<table class="ltable"><thead><tr>
    <th>Card</th><th>Contractor</th><th>Company</th><th>Issued</th><th>Return by</th><th>Issued by</th><th>Returned</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── CSV export ────────────────────────────────────────────────────────────
function exportCSV() {
  if (!log.length) { showToast('No log entries to export yet.','warn'); return; }
  const hdr = ['Card','Contractor','Company','Phone','Issued at','Return by','Issued by','Notes','Returned at','Return notes'];
  const rows = log.map(e => [
    e.cardId,e.name,e.company||'',e.phone||'',
    e.issuedAt?new Date(e.issuedAt).toLocaleString('en-GB'):'',
    e.expectedReturn||'',e.issuedBy,e.notes||'',
    e.returnedAt?new Date(e.returnedAt).toLocaleString('en-GB'):'',e.returnNotes||''
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const a = document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([hdr.join(','),...rows].join('\n'));
  a.download='rcm-contractor-cards-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ── Toast ─────────────────────────────────────────────────────────────────
let ttm;
function showToast(msg,type) {
  const t = document.getElementById('toast'); t.textContent=msg;
  if (type==='warn') { t.style.background='var(--color-background-warning)';t.style.borderColor='var(--color-border-warning)';t.style.color='var(--color-text-warning)'; }
  else { t.style.background='var(--color-background-success)';t.style.borderColor='var(--color-border-success)';t.style.color='var(--color-text-success)'; }
  t.className='show'; clearTimeout(ttm); ttm=setTimeout(()=>t.className='',3500);
}

// ── Boot ──────────────────────────────────────────────────────────────────
(async function init() {
  if (!canWrite) document.getElementById('token-banner').classList.add('show');
  const ok = await loadFromGitHub();
  if (ok) { renderCards(); updCounts(); }
  // Auto-refresh every 60 s when tab is visible
  setInterval(() => {
    if (!document.hidden) loadFromGitHub().then(() => { renderCards(); updCounts(); });
  }, 60000);
})();
</script>
</body>
